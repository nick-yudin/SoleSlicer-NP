name: SoleSlicer CLI Linux

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - zaa-core-port
    paths:
      - "src/**"
      - "deps/**"
      - "scripts/ci/**"
      - "docker/cli/**"
      - "build_linux.sh"
      - "CMakeLists.txt"
      - "version.inc"
      - ".github/workflows/soleslicer-cli-linux.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "deps/**"
      - "scripts/ci/**"
      - "docker/cli/**"
      - "build_linux.sh"
      - "CMakeLists.txt"
      - "version.inc"
      - ".github/workflows/soleslicer-cli-linux.yml"

jobs:
  build_linux_cli:
    name: Build Linux CLI + ZAA Smoke
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    env:
      DEPS_CACHE_KEY: ubuntu-2404-orca-deps-v1

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: "true"

      - name: Install Ubuntu build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake git g++ build-essential libgl1-mesa-dev m4 \
            libwayland-dev libxkbcommon-dev wayland-protocols extra-cmake-modules pkgconf \
            libglu1-mesa-dev libcairo2-dev libgtk-3-dev libsoup2.4-dev libwebkit2gtk-4.1-dev \
            libgstreamer1.0-dev libgstreamer-plugins-good1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-bad wget sudo autoconf curl libunwind-dev texinfo

      - name: Restore deps cache
        id: cache-deps
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/deps/build/destdir
          key: ${{ env.DEPS_CACHE_KEY }}

      - name: Build deps (cache miss)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        run: |
          sudo ./build_linux.sh -ur
          sudo chown "$USER" -R ./
          ./build_linux.sh -dr

      - name: Save deps cache
        if: always() && steps.cache-deps.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/deps/build/destdir
          key: ${{ env.DEPS_CACHE_KEY }}

      - name: Build Orca CLI package
        run: |
          ./build_linux.sh -sr
          ./build/package/bin/orca-slicer --help >/tmp/soleslicer-help.txt

      - name: Run ZAA CLI smoke test
        run: |
          ./scripts/ci/smoke_zaa_cli.sh ./build/package/bin/orca-slicer

      - name: Prepare package artifact
        run: |
          mkdir -p dist/package
          cp -a build/package/. dist/package/

      - name: Upload Linux CLI package artifact
        uses: actions/upload-artifact@v4
        with:
          name: soleslicer-cli-linux-amd64-package
          path: dist/package

  publish_ghcr:
    name: Publish GHCR Runtime Image
    needs: build_linux_cli
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Linux package artifact
        uses: actions/download-artifact@v5
        with:
          name: soleslicer-cli-linux-amd64-package
          path: docker/cli/package

      - name: Build runtime image
        run: |
          docker build -t soleslicer-np-cli:ci -f docker/cli/Dockerfile.runtime docker/cli

      - name: Smoke test runtime image
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/scripts/ci:/ci:ro" \
            soleslicer-np-cli:ci \
            /ci/smoke_zaa_cli.sh /opt/soleslicer/bin/orca-slicer

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push runtime image tags
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/soleslicer-np-cli"
          docker tag soleslicer-np-cli:ci "${IMAGE}:${GITHUB_SHA}"
          docker push "${IMAGE}:${GITHUB_SHA}"

          if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            docker tag soleslicer-np-cli:ci "${IMAGE}:latest"
            docker push "${IMAGE}:latest"
          fi

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION_TAG="${GITHUB_REF#refs/tags/}"
            docker tag soleslicer-np-cli:ci "${IMAGE}:${VERSION_TAG}"
            docker push "${IMAGE}:${VERSION_TAG}"
          fi
